version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports: ['5173:5173']
    volumes:
      - ./:/app
      - /app/node_modules  # anonymous volume — don't overwrite with host
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
    command: npm run dev -- --host
    restart: 'no'
